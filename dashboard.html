<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | BIT Sathy</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-app: #F4F7FE; --bg-surface: #FFFFFF; --primary: #4318FF; --primary-light: #E9E3FF; --purple: #7C3AED; --text-main: #2B3674; --text-muted: #A3AED0; --shadow-soft: 0px 18px 40px rgba(112, 144, 176, 0.12); --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05); --radius-card: 20px; --radius-pill: 50px; --success: #10B981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-app); color: var(--text-main); height: 100vh; overflow: hidden; }
        #app-view { display: flex; height: 100vh; padding: 20px; gap: 20px; }
        .sidebar { width: 260px; background: var(--bg-surface); border-radius: var(--radius-card); padding: 24px 16px; display: flex; flex-direction: column; box-shadow: var(--shadow-soft); }
        .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.25rem; margin-bottom: 40px; padding: 0 10px; color: var(--text-main); }
        .brand-icon { background: var(--primary); color: white; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        .nav-menu { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted); font-weight: 600; text-decoration: none; border-radius: 12px; transition: all 0.2s; cursor: pointer; }
        .nav-item:hover { color: var(--text-main); background: #F4F7FE; }
        .nav-item.active { background: var(--text-main); color: white; border-radius: var(--radius-pill); }
        .nav-bottom { margin-top: auto; border-top: 1px solid #E2E8F0; padding-top: 20px; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; padding-right: 10px; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; background: var(--bg-surface); padding: 12px 24px; border-radius: var(--radius-pill); box-shadow: var(--shadow-soft); flex-shrink: 0; }
        .search-bar { background: var(--bg-app); border-radius: var(--radius-pill); padding: 10px 20px; display: flex; align-items: center; gap: 10px; width: 300px; color: var(--text-muted); }
        .search-bar input { border: none; background: transparent; outline: none; font-size: 0.9rem; width: 100%; color: var(--text-main); }
        .user-profile { display: flex; align-items: center; gap: 15px; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1.2fr 2fr; gap: 20px; margin-bottom: 20px; }
        .card { background: var(--bg-surface); border-radius: var(--radius-card); padding: 24px; box-shadow: var(--shadow-soft); }
        .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .stat-card { background: var(--bg-surface); border-radius: var(--radius-card); padding: 20px; box-shadow: var(--shadow-soft); display: flex; flex-direction: column; }
        .stat-header { display: flex; align-items: center; gap: 10px; color: var(--text-muted); font-weight: 500; font-size: 0.85rem; margin-bottom: 10px; white-space: nowrap; }
        .icon-box { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--bg-app); color: var(--primary); flex-shrink: 0; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--text-main); display: flex; align-items: center; justify-content: space-between; }
        .modern-table { width: 100%; border-collapse: collapse; text-align: left; }
        .modern-table th { padding: 12px; color: var(--text-muted); font-size: 0.85rem; font-weight: 600; border-bottom: 1px solid #E2E8F0; text-transform: uppercase; }
        .modern-table td { padding: 16px 12px; border-bottom: 1px solid #E2E8F0; font-size: 0.95rem; font-weight: 500; }
        .modern-table tr:last-child td { border-bottom: none; }
        .badge { padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; }
        .badge-success { background: #E6F4EA; color: #1E8E3E; }
    </style>
</head>
<body>
    <div id="app-view">
        <aside class="sidebar">
            <div class="brand"><div class="brand-icon"><i class="fa-solid fa-code"></i></div> BIT Sathy IT</div>
            <div class="nav-menu">
                <a class="nav-item active" href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a class="nav-item" href="activities.html"><i class="fa-solid fa-rocket"></i> Activities</a>
                <a class="nav-item" href="academics.html"><i class="fa-solid fa-book"></i> Academics</a>
                <a class="nav-item" href="#"><i class="fa-solid fa-building-columns"></i> Library</a>
                <a class="nav-item" href="#"><i class="fa-solid fa-bed"></i> Hostel</a>
                <a class="nav-item" href="#"><i class="fa-solid fa-indian-rupee-sign"></i> Fees & Dues</a>
            </div>
            <div class="nav-bottom">
                <a class="nav-item" onclick="signOut()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div class="search-bar"><i class="fa-solid fa-search"></i><input type="text" placeholder="Search records..."></div>
                <div class="user-profile">
                    <div style="text-align: right; margin-left: 15px;">
                        <div id="userName" style="font-weight: 700; font-size: 0.9rem;">--</div>
                        <div id="userEmail" style="font-size: 0.75rem; color: var(--text-muted);">--</div>
                    </div>
                    <img id="userImage" src="" class="profile-img" alt="Profile">
                </div>
            </header>

            <div class="grid-stats">
                <div class="stat-card"><div class="stat-header"><div class="icon-box"><i class="fa-solid fa-graduation-cap"></i></div> CGPA</div><div class="stat-value"><span id="cgpa-val">--</span></div></div>
                <div class="stat-card"><div class="stat-header"><div class="icon-box"><i class="fa-solid fa-chart-line"></i></div> SGPA</div><div class="stat-value"><span id="sgpa-val">--</span></div></div>
                <div class="stat-card"><div class="stat-header"><div class="icon-box"><i class="fa-solid fa-user-check"></i></div> Attendance</div><div class="stat-value"><span id="avg-attendance-val">--%</span></div></div>
                <div class="stat-card"><div class="stat-header"><div class="icon-box" style="color: #D93025; background: #FCE8E6;"><i class="fa-solid fa-triangle-exclamation"></i></div> Arrears</div><div class="stat-value"><span id="arrears-val">--</span></div></div>
                <div class="stat-card"><div class="stat-header"><div class="icon-box" style="color: #D97706; background: #FEF3C7;"><i class="fa-solid fa-indian-rupee-sign"></i></div> Fees</div><div class="stat-value"><span id="fees-val">₹ 0</span></div></div>
                <div class="stat-card"><div class="stat-header"><div class="icon-box" style="color: #8B5CF6; background: #F3E8FF;"><i class="fa-solid fa-calendar-xmark"></i></div> Leaves</div><div class="stat-value"><span id="leaves-val">3</span></div></div>
            </div>

            <div class="grid-2">
                <div class="card" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">
                    <div class="card-title" style="margin-bottom: 5px; font-size: 1rem; color: var(--text-main); font-weight: 800;">Semester GPA</div>
                    <div style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 15px;">Historical Trend</div>
                    <div style="position: relative; height: 140px; width: 100%;"><canvas id="performanceChart"></canvas></div>
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <div class="card" style="padding: 20px;">
                        <div class="card-title" style="margin-bottom: 15px; font-size: 1rem;">Campus Log</div>
                        <div style="display: flex; align-items: center; gap: 20px; padding: 10px 0;">
                            <div style="width: 50px; height: 50px; border-radius: 12px; background: var(--primary-light); color: var(--primary); display: flex; justify-content: center; align-items: center; font-size: 1.5rem;"><i class="fa-solid fa-fingerprint"></i></div>
                            <div>
                                <div style="font-size: 1.4rem; font-weight: 800; color: var(--text-main);">08:45 AM</div>
                                <div style="font-size: 0.9rem; color: var(--text-muted); font-weight: 600;"><i class="fa-solid fa-location-dot" style="margin-right: 5px;"></i>Main Arch Gate</div>
                            </div>
                        </div>
                    </div>

                    <div class="card" style="padding: 20px; flex: 1;">
                        <div class="card-title" style="margin-bottom: 15px; font-size: 1rem;">Recent Leave Applications</div>
                        <div style="overflow-x: auto;">
                            <table class="modern-table" style="font-size: 0.85rem;">
