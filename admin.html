<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIT Master Admin | Real-time Sync</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4318FF; --bg: #F4F7FE; --surface: #FFFFFF; --text: #2B3674; --shadow: 0px 18px 40px rgba(112, 144, 176, 0.12); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 30px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Auth Overlay */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        
        /* Header & Search */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .search-box { background: var(--surface); padding: 12px 25px; border-radius: 50px; display: flex; align-items: center; gap: 12px; width: 450px; box-shadow: var(--shadow); }
        .search-box input { border: none; outline: none; width: 100%; font-weight: 600; background: transparent; }
        
        /* Directory Table */
        .table-card { background: var(--surface); border-radius: 30px; padding: 30px; box-shadow: var(--shadow); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; padding: 20px; color: #8B98B4; font-size: 0.8rem; text-transform: uppercase; border-bottom: 2px solid #F4F7FE; }
        td { padding: 20px; font-weight: 700; border-bottom: 1px solid #F4F7FE; transition: 0.2s; }
        tr:hover td { background: #F8FAFF; color: var(--primary); cursor: pointer; }

        /* Management Modal */
        #edit-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1500; }
        .modal-content { background: white; width: 95%; max-width: 900px; border-radius: 35px; padding: 40px; max-height: 90vh; overflow-y: auto; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin: 20px 0; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.7rem; font-weight: 800; color: #8B98B4; text-transform: uppercase; }
        input { padding: 12px; border: 2px solid #F4F7FE; border-radius: 12px; font-weight: 700; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        
        .btn { padding: 14px 28px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; margin-top: 20px; }
        .btn-add { background: #E9E3FF; color: var(--primary); font-size: 0.8rem; margin-bottom: 10px; }
        .dynamic-row { background: #F8FAFF; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #E9E3FF; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div style="background:white; padding: 3.5rem; border-radius: 35px; box-shadow: var(--shadow); text-align: center; width: 400px;">
            <div style="background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; font-size: 1.5rem;"><i class="fa-solid fa-shield-halved"></i></div>
            <h2 style="font-weight: 800; margin-bottom: 10px;">Master Access</h2>
            <p style="color: #8B98B4; margin-bottom: 30px; font-weight: 600;">Authorized Personnel Only</p>
            <div id="g_id_signin"></div>
        </div>
    </div>

    <div class="container" id="main-content" style="display: none;">
        <div class="top-bar">
            <h1 style="font-weight: 800;">Student Management</h1>
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass" style="color: var(--primary);"></i>
                <input type="text" id="studentSearch" placeholder="Search by name, email, or roll..." onkeyup="filterStudents()">
            </div>
            <button class="btn btn-primary" style="width: auto; margin: 0;" onclick="openModal()"><i class="fa-solid fa-user-plus"></i> Add Student</button>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Student Identity</th>
                        <th>Roll Number</th>
                        <th>Department</th>
                        <th>Academic Summary</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="directoryBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="edit-modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2 style="font-weight: 800; color: var(--primary);"><i class="fa-solid fa-sliders"></i> Management Console</h2>
                <i class="fa-solid fa-circle-xmark" style="font-size: 1.8rem; cursor: pointer; color: #E2E8F0;" onclick="closeModal()"></i>
            </div>
            
            <h4 style="border-bottom: 2px solid #F4F7FE; padding-bottom: 10px; margin-bottom: 15px;"><i class="fa-solid fa-address-card"></i> Profile & Dashboard</h4>
            <div class="grid">
                <div class="input-group"><label>Full Name</label><input type="text" id="m_name"></div>
                <div class="input-group"><label>Email ID</label><input type="email" id="m_email"></div>
                <div class="input-group"><label>Roll Number</label><input type="text" id="m_roll"></div>
                <div class="input-group"><label>Department</label><input type="text" id="m_dept"></div>
                <div class="input-group"><label>CGPA</label><input type="number" id="m_cgpa" step="0.01"></div>
                <div class="input-group"><label>Current SGPA</label><input type="number" id="m_sgpa" step="0.01"></div>
                <div class="input-group"><label>Attendance %</label><input type="number" id="m_att" step="0.1"></div>
                <div class="input-group"><label>Arrears</label><input type="number" id="m_arrears"></div>
            </div>

            <h4 style="border-bottom: 2px solid #F4F7FE; padding-bottom: 10px; margin-top: 25px;"><i class="fa-solid fa-bolt"></i> PCDP Skills & Levels</h4>
            <div id="skill-list" style="margin-top: 15px;"></div>
            <button class="btn btn-add" onclick="addSkillRow()"><i class="fa-solid fa-plus"></i> Add New Skill</button>

            <h4 style="border-bottom: 2px solid #F4F7FE; padding-bottom: 10px; margin-top: 25px;"><i class="fa-solid fa-graduation-cap"></i> Academic Transcript</h4>
            <div id="sem-list" style="margin-top: 15px;"></div>
            <button class="btn btn-add" onclick="addSemRow()"><i class="fa-solid fa-plus"></i> Add Semester/Course</button>

            <button class="btn btn-primary" onclick="saveMasterSync()">SYNC MASTER DATA TO CLOUD</button>
        </div>
    </div>

    <script>
        let adminToken = null;
        let allStudents = [];

        // Auth Logic
        async function handleCredentialResponse(response) {
            adminToken = response.credential;
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            fetchStudentList(); // Auto-load database
        }

        async function fetchStudentList() {
            try {
                const res = await fetch('https://login-o753.onrender.com/api/admin/list-students');
                const data = await res.json();
                allStudents = data.students;
                renderDirectory(allStudents);
            } catch (e) { alert("Cloud Sync Failed. Check Aiven status."); }
        }

        function renderDirectory(list) {
            const body = document.getElementById('directoryBody');
            body.innerHTML = list.map(s => `
                <tr onclick="window.open('index.html?viewAs=${s.email}', '_blank')">
                    <td>
                        <div style="font-weight: 800; color: var(--text);">${s.full_name}</div>
                        <div style="font-size: 0.75rem; color: var(--primary);">${s.email}</div>
                    </td>
                    <td>${s.roll_no || '--'}</td>
                    <td>${s.department || '--'}</td>
                    <td>
                        <div style="font-size: 0.85rem; font-weight: 700;">GPA: ${parseFloat(s.cgpa).toFixed(2)}</div>
                        <div style="font-size: 0.7rem; color: #8B98B4;">Arrears: ${s.arrears}</div>
                    </td>
                    <td onclick="event.stopPropagation(); openModal('${s.email}')">
                        <span style="background: var(--primary-light); color: var(--primary); padding: 8px 15px; border-radius: 10px; font-size: 0.8rem;"><i class="fa-solid fa-pen-to-square"></i> Edit</span>
                    </td>
                </tr>
            `).join('');
        }

        // Modal Controls
        function openModal(email = '') {
            const s = allStudents.find(x => x.email === email) || { email: '', full_name: '', roll_no: '', department: '', cgpa: 0, sgpa: 0, attendance: 0, arrears: 0 };
            document.getElementById('m_email').value = s.email;
            document.getElementById('m_name').value = s.full_name;
            document.getElementById('m_roll').value = s.roll_no;
            document.getElementById('m_dept').value = s.department;
            document.getElementById('m_cgpa').value = s.cgpa;
            document.getElementById('m_sgpa').value = s.sgpa;
            document.getElementById('m_att').value = s.attendance;
            document.getElementById('m_arrears').value = s.arrears;
            
            document.getElementById('skill-list').innerHTML = '';
            document.getElementById('sem-list').innerHTML = '';
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }

        function addSkillRow() {
            const div = document.createElement('div');
            div.className = 'grid dynamic-row';
            div.innerHTML = `<input type="text" placeholder="Skill Name" class="s-name"><input type="text" placeholder="Category" class="s-cat"><input type="number" placeholder="Total Levels" class="s-total"><input type="number" placeholder="Completed" class="s-comp"><input type="text" placeholder="Image URL" class="s-img">`;
            document.getElementById('skill-list').appendChild(div);
        }

        function addSemRow() {
            const div = document.createElement('div');
            div.className = 'grid dynamic-row';
            div.innerHTML = `<input type="number" placeholder="Sem" class="sem-num"><input type="text" placeholder="Course Name" class="sem-course"><input type="number" placeholder="Marks" class="sem-marks"><input type="text" placeholder="Grade" class="sem-grade">`;
            document.getElementById('sem-list').appendChild(div);
        }

        // Master Sync to Backend
        async function saveMasterSync() {
            const payload = {
                adminToken: adminToken,
                targetEmail: document.getElementById('m_email').value,
                profile: {
                    name: document.getElementById('m_name').value,
                    roll: document.getElementById('m_roll').value,
                    dept: document.getElementById('m_dept').value,
                    cgpa: document.getElementById('m_cgpa').value,
                    sgpa: document.getElementById('m_sgpa').value,
                    attendance: document.getElementById('m_att').value,
                    reward: 0, arrears: document.getElementById('m_arrears').value, leaves: 0, applied: 0, shortlisted: 0, offers: 0, highest_ctc: '0'
                },
                skills: Array.from(document.querySelectorAll('.dynamic-row')).filter(r => r.querySelector('.s-name')).map(r => ({
                    name: r.querySelector('.s-name').value, cat: r.querySelector('.s-cat').value, total: r.querySelector('.s-total').value, comp: r.querySelector('.s-comp').value, img: r.querySelector('.s-img').value
                })),
                academics: Array.from(document.querySelectorAll('.dynamic-row')).filter(r => r.querySelector('.sem-num')).map(r => ({
                    sem: r.querySelector('.sem-num').value, course: r.querySelector('.sem-course').value, marks: r.querySelector('.sem-marks').value, grade: r.querySelector('.sem-grade').value
                }))
            };

            const res = await fetch('https://login-o753.onrender.com/api/admin/master-sync', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            if(result.success) { fetchStudentList(); closeModal(); }
        }

        function filterStudents() {
            const query = document.getElementById('studentSearch').value.toLowerCase();
            const filtered = allStudents.filter(s => s.full_name.toLowerCase().includes(query) || s.email.toLowerCase().includes(query) || s.roll_no.toLowerCase().includes(query));
            renderDirectory(filtered);
        }

        window.onload = () => {
            google.accounts.id.initialize({ client_id: "318717217301-kot0gq3l7amhtfphhvsbjh4ehau9heb4.apps.googleusercontent.com", callback: handleCredentialResponse });
            google.accounts.id.renderButton(document.getElementById("g_id_signin"), { theme: "filled_blue", size: "large", shape: "pill" });
        };
    </script>
</body>
</html>
