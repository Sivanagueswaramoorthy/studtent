<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIT Admin | Management Console</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4318FF; --bg: #F4F7FE; --text: #2B3674; --shadow: 0px 18px 40px rgba(112, 144, 176, 0.12); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px 20px; }
        .admin-card { background: white; width: 100%; max-width: 550px; padding: 40px; border-radius: 30px; box-shadow: var(--shadow); border-top: 6px solid var(--primary); }
        .header { text-align: center; margin-bottom: 30px; }
        .header i { font-size: 2rem; color: var(--primary); margin-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; color: #8B98B4; margin-bottom: 8px; }
        input, select { width: 100%; padding: 14px; border: 2px solid #E2E8F0; border-radius: 16px; font-weight: 600; outline: none; transition: 0.2s; background: #FBFCFF; }
        input:focus { border-color: var(--primary); background: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-sync { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 18px; font-weight: 800; cursor: pointer; margin-top: 15px; box-shadow: 0px 10px 20px rgba(67, 24, 255, 0.2); transition: 0.3s; }
        .btn-sync:hover { transform: translateY(-2px); box-shadow: 0px 12px 25px rgba(67, 24, 255, 0.3); }
        #status { margin-top: 20px; text-align: center; font-weight: 700; border-radius: 12px; display: none; padding: 15px; }
    </style>
</head>
<body>
    <div class="admin-card">
        <div class="header">
            <i class="fa-solid fa-user-shield"></i>
            <h2>Admin Portal</h2>
            <p id="auth-status">Sign in to manage student records</p>
        </div>

        <div id="g_id_signin" style="display: flex; justify-content: center; margin-bottom: 20px;"></div>

        <form id="admin-form" style="display: none;">
            <div class="form-group">
                <label>Target Student</label>
                <select id="targetEmail">
                    <option value="sivanagu7771@gmail.com">Sivanagu E</option>
                    <option value="kvabhinanthan@gmail.com">Abhinanthan K V</option>
                    <option value="sivanague@gmail.com">Sivanagu Personal</option>
                </select>
            </div>

            <div class="grid">
                <div class="form-group"><label>CGPA</label><input type="number" id="cgpa" step="0.01" placeholder="9.00"></div>
                <div class="form-group"><label>SGPA</label><input type="number" id="sgpa" step="0.01" placeholder="8.50"></div>
                <div class="form-group"><label>Reward Pts</label><input type="number" id="reward" placeholder="500"></div>
                <div class="form-group"><label>Arrears</label><input type="number" id="arrears" placeholder="0"></div>
            </div>

            <div class="form-group"><label>Leaves Taken</label><input type="number" id="leaves" placeholder="2"></div>

            <button type="button" class="btn-sync" onclick="syncData()"><i class="fa-solid fa-rotate"></i> Sync to Database</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        let adminToken = null;
        function handleCredentialResponse(response) {
            adminToken = response.credential;
            document.getElementById('admin-form').style.display = 'block';
            document.getElementById('g_id_signin').style.display = 'none';
            document.getElementById('auth-status').innerHTML = '<span style="color:#059669">Authorized Admin Session</span>';
        }

        async function syncData() {
            const status = document.getElementById('status');
            const updates = {
                cgpa: document.getElementById('cgpa').value,
                sgpa: document.getElementById('sgpa').value,
                reward: document.getElementById('reward').value,
                arrears: document.getElementById('arrears').value,
                leaves: document.getElementById('leaves').value
            };

            try {
                const res = await fetch('https://login-o753.onrender.com/api/admin/update-student', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminToken, targetEmail: document.getElementById('targetEmail').value, updates })
                });
                const data = await res.json();
                status.style.display = "block";
                status.style.background = data.success ? "#E6F4EA" : "#FCE8E6";
                status.style.color = data.success ? "#059669" : "#EE5D50";
                status.innerText = data.message;
            } catch (e) { alert("Server Connection Error"); }
        }

        window.onload = () => {
            google.accounts.id.initialize({ client_id: "318717217301-kot0gq3l7amhtfphhvsbjh4ehau9heb4.apps.googleusercontent.com", callback: handleCredentialResponse });
            google.accounts.id.renderButton(document.getElementById("g_id_signin"), { theme: "filled_blue", size: "large", shape: "pill" });
        };
    </script>
</body>
</html>
