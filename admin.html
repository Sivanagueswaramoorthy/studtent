<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Admin | System Control</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4318FF;
            --primary-hover: #3311CC;
            --bg: #F4F7FE;
            --surface: #FFFFFF;
            --text-main: #2B3674;
            --text-muted: #8B98B4;
            --error: #EE5D50;
            --success: #059669;
            --shadow: 0px 18px 40px rgba(112, 144, 176, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .container { width: 100%; max-width: 550px; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .admin-card { background: var(--surface); border-radius: 30px; padding: 40px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
        
        /* Top Accent Bar */
        .admin-card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: var(--primary); }

        .header { text-align: center; margin-bottom: 35px; }
        .header .icon-circle { width: 60px; height: 60px; background: var(--bg); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px auto; font-size: 1.5rem; }
        .header h2 { font-weight: 800; font-size: 1.5rem; color: var(--text-main); letter-spacing: -0.5px; }
        .header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; font-weight: 500; }

        .login-section { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px 0; }

        .form-section { display: none; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; color: var(--text-main); font-size: 0.85rem; margin-bottom: 10px; padding-left: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select { 
            width: 100%; padding: 14px 18px; border: 2px solid #E2E8F0; border-radius: 16px; 
            outline: none; font-size: 0.95rem; font-weight: 600; color: var(--text-main); 
            transition: all 0.2s; background: #FBFCFF;
        }
        input:focus, select:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(67, 24, 255, 0.05); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn-submit { 
            width: 100%; background: var(--primary); color: white; border: none; padding: 18px; 
            border-radius: 18px; font-weight: 800; font-size: 1rem; cursor: pointer; 
            transition: all 0.3s; margin-top: 10px; box-shadow: 0px 10px 20px rgba(67, 24, 255, 0.2); 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-submit:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0px 12px 25px rgba(67, 24, 255, 0.3); }
        .btn-submit:active { transform: translateY(0); }

        #status { 
            margin-top: 25px; padding: 15px; border-radius: 14px; text-align: center; 
            font-weight: 700; font-size: 0.9rem; display: none;
        }
        .status-success { background: #E6F4EA; color: var(--success); display: block !important; }
        .status-error { background: #FCE8E6; color: var(--error); display: block !important; }

        .footer-note { text-align: center; margin-top: 25px; font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <div class="admin-card">
            <div class="header">
                <div class="icon-circle"><i class="fa-solid fa-shield-halved"></i></div>
                <h2>Management Console</h2>
                <p>Authorized personnel only</p>
            </div>

            <div id="auth-layer" class="login-section">
                <div id="g_id_signin"></div>
            </div>

            <div id="form-layer" class="form-section">
                <div class="input-group">
                    <label>Target Student</label>
                    <select id="targetEmail">
                        <option value="kvabhinathan@gmail.com">Abhinathan K V</option>
                        <option value="sivanagu7771@gmail.com">Sivanagu E</option>
                    </select>
                </div>

                <div class="grid-2">
                    <div class="input-group">
                        <label>Current CGPA</label>
                        <input type="number" id="cgpa" step="0.01" placeholder="9.00">
                    </div>
                    <div class="input-group">
                        <label>Last SGPA</label>
                        <input type="number" id="sgpa" step="0.01" placeholder="8.50">
                    </div>
                    <div class="input-group">
                        <label>Reward Points</label>
                        <input type="number" id="reward" placeholder="500">
                    </div>
                    <div class="input-group">
                        <label>Active Arrears</label>
                        <input type="number" id="arrears" placeholder="0">
                    </div>
                </div>

                <div class="input-group">
                    <label>Leaves Taken</label>
                    <input type="number" id="leaves" placeholder="2">
                </div>

                <button class="btn-submit" onclick="performUpdate()">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Sync to Database
                </button>
            </div>

            <div id="status"></div>
        </div>
        
        <div class="footer-note">
            BIT Sathy IT | Admin Dashboard v2.0
        </div>
    </div>

    <script>
        let adminToken = null;

        function handleCredentialResponse(response) {
            adminToken = response.credential;
            document.getElementById('auth-layer').style.display = 'none';
            document.getElementById('form-layer').style.display = 'block';
            
            // Decorative effect: add "Logged in" badge to header
            document.querySelector('.header p').innerHTML = '<span style="color:var(--success)">● Authorized Session</span>';
        }

        async function performUpdate() {
            const status = document.getElementById('status');
            status.className = ""; // Reset classes
            status.innerText = "Processing update...";
            status.style.display = "block";

            const updates = {
                cgpa: document.getElementById('cgpa').value,
                sgpa: document.getElementById('sgpa').value,
                reward: document.getElementById('reward').value,
                arrears: document.getElementById('arrears').value,
                leaves: document.getElementById('leaves').value
            };

            try {
                const res = await fetch('https://login-o753.onrender.com/api/admin/update-student', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        adminToken: adminToken,
                        targetEmail: document.getElementById('targetEmail').value,
                        updates: updates
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    status.innerText = "Success! Records updated instantly.";
                    status.classList.add('status-success');
                } else {
                    status.innerText = data.message || "Update failed.";
                    status.classList.add('status-error');
                }
            } catch (err) {
                status.innerText = "Connection lost. Is Render online?";
                status.classList.add('status-error');
            }
        }

        window.onload = () => {
            google.accounts.id.initialize({
                client_id: "318717217301-kot0gq3l7amhtfphhvsbjh4ehau9heb4.apps.googleusercontent.com",
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(document.getElementById("g_id_signin"), { 
                theme: "filled_blue", 
                size: "large",
                shape: "pill"
            });
        };
    </script>
</body>
</html>
