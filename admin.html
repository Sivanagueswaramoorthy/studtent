<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIT Admin | Master Directory</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4318FF; --bg: #F4F7FE; --surface: #FFFFFF; --text: #2B3674; --shadow: 0px 18px 40px rgba(112, 144, 176, 0.12); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 30px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .search-box { background: var(--surface); padding: 12px 20px; border-radius: 50px; display: flex; align-items: center; gap: 10px; width: 400px; box-shadow: var(--shadow); }
        .search-box input { border: none; outline: none; width: 100%; font-weight: 600; }
        .btn { padding: 12px 24px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-ghost { background: #E9E3FF; color: var(--primary); font-size: 0.8rem; margin-top: 10px; }
        .table-card { background: var(--surface); border-radius: 24px; padding: 25px; box-shadow: var(--shadow); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #8B98B4; font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid #F4F7FE; }
        td { padding: 18px 15px; font-weight: 700; border-bottom: 1px solid #F4F7FE; cursor: pointer; }
        tr:hover td { background: #F8FAFF; color: var(--primary); }
        #edit-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .edit-modal { background: white; width: 95%; max-width: 900px; max-height: 90vh; border-radius: 30px; padding: 40px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #8B98B4; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 2px solid #F4F7FE; border-radius: 12px; font-weight: 700; outline: none; }
        input:focus { border-color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1 style="font-weight: 800;">Master Directory</h1>
            <div class="search-box"><i class="fa-solid fa-search"></i><input type="text" id="search" placeholder="Search student..." onkeyup="filterTable()"></div>
            <button class="btn btn-primary" onclick="openAdd()"><i class="fa-solid fa-user-plus"></i> Add Mail ID</button>
        </div>
        <div class="table-card">
            <table>
                <thead><tr><th>Student</th><th>Email</th><th>Roll No</th><th>Department</th><th>Action</th></tr></thead>
                <tbody id="studentTable"></tbody>
            </table>
        </div>
    </div>

    <div id="edit-overlay">
        <div class="edit-modal">
            <h2 id="modalTitle" style="font-weight: 800; color: var(--primary);">Management Console</h2>
            <div class="grid">
                <div class="form-group"><label>Full Name</label><input type="text" id="m_name"></div>
                <div class="form-group"><label>Email ID</label><input type="email" id="m_email"></div>
                <div class="form-group"><label>Roll No</label><input type="text" id="m_roll"></div>
                <div class="form-group"><label>Department</label><input type="text" id="m_dept"></div>
                <div class="form-group"><label>CGPA</label><input type="number" id="m_cgpa" step="0.01"></div>
                <div class="form-group"><label>SGPA</label><input type="number" id="m_sgpa" step="0.01"></div>
                <div class="form-group"><label>Attendance %</label><input type="number" id="m_att" step="0.1"></div>
                <div class="form-group"><label>Reward Pts</label><input type="number" id="m_reward"></div>
            </div>
            <hr style="margin:20px 0; border:1px solid #F4F7FE;">
            <div id="dynamic-skills"><h3>Skills (PCDP)</h3></div>
            <button class="btn btn-ghost" onclick="addSkillRow()">+ Add Skill</button>
            <button class="btn btn-primary" style="width:100%; margin-top:30px;" onclick="saveChanges()">Save All Data</button>
            <button class="btn" style="width:100%; margin-top:10px; background:#FCE8E6; color:#D93025" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        let adminJwt = null;
        let students = [];

        async function fetchList() {
            const res = await fetch('https://login-o753.onrender.com/api/admin/list-students');
            const data = await res.json();
            students = data.students;
            renderTable(students);
        }

        function renderTable(list) {
            document.getElementById('studentTable').innerHTML = list.map(s => `
                <tr onclick="edit('${s.email}')">
                    <td>${s.full_name}</td><td>${s.email}</td><td>${s.roll_no}</td><td>${s.department}</td>
                    <td><i class="fa-solid fa-pen-to-square"></i> Edit</td>
                </tr>
            `).join('');
        }

        function edit(email) {
            const s = students.find(x => x.email === email) || { email, full_name: '', roll_no: '', department: '' };
            document.getElementById('m_email').value = s.email;
            document.getElementById('m_name').value = s.full_name;
            document.getElementById('m_roll').value = s.roll_no;
            document.getElementById('m_dept').value = s.department;
            document.getElementById('m_cgpa').value = s.cgpa || 0;
            document.getElementById('m_sgpa').value = s.sgpa || 0;
            document.getElementById('m_att').value = s.attendance || 0;
            document.getElementById('m_reward').value = s.reward_points || 0;
            document.getElementById('edit-overlay').style.display = 'flex';
        }

        function openAdd() { edit(''); }
        function closeModal() { document.getElementById('edit-overlay').style.display = 'none'; }

        async function saveChanges() {
            const payload = {
                adminToken: adminJwt,
                targetEmail: document.getElementById('m_email').value,
                profile: { name: document.getElementById('m_name').value, roll: document.getElementById('m_roll').value, dept: document.getElementById('m_dept').value, cgpa: document.getElementById('m_cgpa').value, sgpa: document.getElementById('m_sgpa').value, attendance: document.getElementById('m_att').value, reward: document.getElementById('m_reward').value, arrears: 0, leaves: 0, applied: 0, shortlisted: 0, offers: 0, highest_ctc: '0 LPA' },
                skills: [], academics: []
            };
            const res = await fetch('https://login-o753.onrender.com/api/admin/master-sync', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const result = await res.json();
            if(result.success) { fetchList(); closeModal(); }
        }

        function handleCredentialResponse(r) { adminJwt = r.credential; fetchList(); }
        window.onload = () => {
            google.accounts.id.initialize({ client_id: "318717217301-kot0gq3l7amhtfphhvsbjh4ehau9heb4.apps.googleusercontent.com", callback: handleCredentialResponse });
            google.accounts.id.renderButton(document.getElementById("g_id_signin"), { theme: "outline", size: "large" });
        };
    </script>
</body>
</html>
